  DOTA_COMBATLOG_DAMAGE = 0;
  DOTA_COMBATLOG_HEAL = 1;
  DOTA_COMBATLOG_MODIFIER_ADD = 2;
  DOTA_COMBATLOG_MODIFIER_REMOVE = 3;
  DOTA_COMBATLOG_DEATH = 4;
  DOTA_COMBATLOG_ABILITY = 5;
